<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UpDish — Vancouver Food Scene Map</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>
<style>
  /* ── Reset & base ──────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0e0e0e;
    --surface:    #161616;
    --surface2:   #1e1e1e;
    --border:     rgba(255,255,255,0.08);
    --border2:    rgba(255,255,255,0.14);
    --text:       #f0ede8;
    --muted:      #8a8782;
    --hint:       #4f4e4b;
    --accent:     #c8f552;   /* sharp yellow-green */
    --accent-dim: rgba(200,245,82,0.12);
    --cafe:       #c8f552;
    --restaurant: #52c8f5;
    --bar:        #f5a352;
    --truck:      #f552b2;
    --inactive:   #3a3a3a;
    --ff-head:    'DM Serif Display', Georgia, serif;
    --ff-body:    'DM Sans', system-ui, sans-serif;
    --ff-mono:    'DM Mono', monospace;
  }

  html, body { height: 100%; font-family: var(--ff-body); background: var(--bg); color: var(--text); overflow: hidden; }

  /* ── App shell ─────────────────────────────────────────────────── */
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* ── Top bar ───────────────────────────────────────────────────── */
  #topbar {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0; z-index: 900;
  }

  #logo {
    font-family: var(--ff-head);
    font-size: 22px;
    letter-spacing: -0.5px;
    color: var(--text);
    white-space: nowrap;
    flex-shrink: 0;
  }
  #logo span { color: var(--accent); }

  #search-wrap {
    flex: 1; max-width: 420px;
    position: relative;
  }
  #search-wrap svg {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    width: 14px; height: 14px; opacity: 0.4; pointer-events: none;
  }
  #search-input {
    width: 100%;
    padding: 8px 10px 8px 32px;
    font-family: var(--ff-body); font-size: 13px;
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border2); border-radius: 8px;
    outline: none; transition: border-color 0.15s;
  }
  #search-input:focus { border-color: var(--accent); }
  #search-input::placeholder { color: var(--hint); }

  #count-pill {
    margin-left: auto; flex-shrink: 0;
    font-size: 12px; font-family: var(--ff-mono);
    color: var(--muted); white-space: nowrap;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 5px 10px; border-radius: 100px;
  }
  #count-pill strong { color: var(--accent); }

  #menu-btn {
    display: none; flex-shrink: 0;
    background: none; border: 1px solid var(--border2);
    border-radius: 6px; padding: 7px 9px;
    cursor: pointer; color: var(--text);
    line-height: 1;
  }

  /* ── Body ──────────────────────────────────────────────────────── */
  #body { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ───────────────────────────────────────────────────── */
  #sidebar {
    width: 230px; flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto; transition: transform 0.25s ease;
  }
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .sb-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sb-label {
    font-size: 10px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: var(--hint);
    margin-bottom: 10px;
  }

  /* filter rows */
  .filter-row {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 0; cursor: pointer;
    user-select: none;
  }
  .filter-row input[type="checkbox"] {
    appearance: none; -webkit-appearance: none;
    width: 14px; height: 14px; flex-shrink: 0;
    border: 1.5px solid var(--border2); border-radius: 3px;
    cursor: pointer; position: relative; transition: all 0.12s;
  }
  .filter-row input[type="checkbox"]:checked {
    border-color: var(--accent); background: var(--accent);
  }
  .filter-row input[type="checkbox"]:checked::after {
    content: '';
    position: absolute; top: 1px; left: 3px;
    width: 5px; height: 8px;
    border: 2px solid #000; border-top: none; border-left: none;
    transform: rotate(45deg);
  }
  .filter-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .filter-label-text { font-size: 13px; color: var(--text); flex: 1; }
  .filter-count {
    font-size: 11px; font-family: var(--ff-mono);
    color: var(--hint);
  }

  /* neighbourhood pills */
  .hood-pills { display: flex; flex-wrap: wrap; gap: 5px; }
  .hood-pill {
    font-size: 11px; padding: 4px 9px; border-radius: 100px;
    border: 1px solid var(--border2); cursor: pointer;
    color: var(--muted); transition: all 0.15s; user-select: none;
  }
  .hood-pill.active {
    background: var(--accent); color: #000;
    border-color: var(--accent); font-weight: 500;
  }

  /* status toggle */
  .toggle-row { display: flex; gap: 6px; }
  .toggle-btn {
    flex: 1; font-size: 11px; padding: 6px 8px;
    border: 1px solid var(--border2); border-radius: 6px;
    background: transparent; color: var(--muted); cursor: pointer;
    transition: all 0.15s;
  }
  .toggle-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  /* reset */
  #reset-btn {
    margin: 12px 16px;
    padding: 9px; width: calc(100% - 32px);
    background: none; border: 1px solid var(--border2);
    border-radius: 8px; color: var(--muted); font-size: 12px;
    cursor: pointer; letter-spacing: 0.3px; transition: all 0.15s;
    font-family: var(--ff-body);
  }
  #reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* benchmarks */
  .bench-cards { display: flex; flex-direction: column; gap: 8px; }
  .bench-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 11px;
  }
  .bench-stat {
    font-family: var(--ff-head); font-size: 22px;
    color: var(--accent); line-height: 1;
  }
  .bench-desc { font-size: 11px; color: var(--text); margin-top: 3px; line-height: 1.4; }
  .bench-src { font-size: 10px; color: var(--hint); margin-top: 4px; }

  /* ── Map ───────────────────────────────────────────────────────── */
  #map { flex: 1; }

  /* leaflet overrides */
  .leaflet-container { background: #1a1f1a; font-family: var(--ff-body); }
  .leaflet-tile { filter: brightness(0.55) saturate(0.7) hue-rotate(5deg); }
  .leaflet-control-attribution { background: rgba(0,0,0,0.5) !important; color: #666 !important; font-size: 9px !important; }
  .leaflet-control-attribution a { color: #888 !important; }
  .leaflet-control-zoom a {
    background: var(--surface) !important; color: var(--text) !important;
    border-color: var(--border2) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--surface2) !important; }

  /* custom popup */
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important; color: var(--text) !important;
    border: 1px solid var(--border2) !important;
    border-radius: 12px !important; box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
    padding: 0 !important;
  }
  .leaflet-popup-content { margin: 0 !important; width: auto !important; }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-close-button { color: var(--muted) !important; top: 10px !important; right: 12px !important; font-size: 18px !important; }
  .leaflet-popup-close-button:hover { color: var(--text) !important; }

  /* custom pin svg */
  .pin-dot { cursor: pointer; }

  /* ── Popup inner ───────────────────────────────────────────────── */
  .popup-inner { padding: 16px 18px 14px; min-width: 200px; }
  .popup-type-badge {
    display: inline-block; font-size: 10px; letter-spacing: 0.5px;
    text-transform: uppercase; font-weight: 600;
    padding: 3px 7px; border-radius: 100px; margin-bottom: 8px;
  }
  .popup-name { font-family: var(--ff-head); font-size: 16px; color: var(--text); margin-bottom: 10px; line-height: 1.3; }
  .popup-table { width: 100%; border-collapse: collapse; }
  .popup-table td { font-size: 12px; padding: 3px 0; vertical-align: top; }
  .popup-table td:first-child { color: var(--muted); padding-right: 12px; white-space: nowrap; }
  .popup-table td:last-child { color: var(--text); }
  .popup-status {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 100px; margin-top: 10px;
  }
  .status-active { background: rgba(200,245,82,0.15); color: var(--accent); border: 1px solid rgba(200,245,82,0.3); }
  .status-inactive { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); }
  .popup-divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

  /* ── Legend strip (bottom of map) ─────────────────────────────── */
  #legend {
    position: absolute; bottom: 18px; left: 16px;
    display: flex; gap: 12px; align-items: center;
    background: rgba(14,14,14,0.85); backdrop-filter: blur(6px);
    border: 1px solid var(--border2); border-radius: 100px;
    padding: 7px 14px; z-index: 500;
  }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ── Map wrapper (for legend) ──────────────────────────────────── */
  #map-wrap { flex: 1; position: relative; }

  /* ── Mobile ────────────────────────────────────────────────────── */
  @media (max-width: 680px) {
    #menu-btn { display: block; }
    #count-pill { display: none; }
    #sidebar {
      position: absolute; top: 0; left: 0; bottom: 0;
      z-index: 800; transform: translateX(-100%);
      width: 280px; max-width: 85vw;
    }
    #sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,0.6); }
    #overlay {
      display: none; position: absolute; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 799;
    }
    #overlay.visible { display: block; }
    #body { position: relative; }
    #legend { display: none; }
  }
  @media (min-width: 681px) {
    #overlay { display: none !important; }
  }
</style>
</head>
<body>

<div id="app">
  <!-- Top bar -->
  <div id="topbar">
    <button id="menu-btn" aria-label="Toggle filters">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <rect width="16" height="1.5" rx="1" fill="currentColor"/>
        <rect y="5.25" width="16" height="1.5" rx="1" fill="currentColor"/>
        <rect y="10.5" width="16" height="1.5" rx="1" fill="currentColor"/>
      </svg>
    </button>
    <div id="logo">Up<span>Dish</span></div>
    <div id="search-wrap">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="6.5" cy="6.5" r="4.5"/>
        <path d="M10.5 10.5l3.5 3.5"/>
      </svg>
      <input id="search-input" type="text" placeholder="Search neighbourhood, address, or business…" autocomplete="off" />
    </div>
    <div id="count-pill"><strong id="count-num">80</strong> businesses</div>
  </div>

  <!-- Body -->
  <div id="body">
    <div id="overlay"></div>

    <!-- Sidebar -->
    <div id="sidebar">
      <!-- Type filters -->
      <div class="sb-section">
        <div class="sb-label">Business type</div>
        <label class="filter-row">
          <input type="checkbox" id="f-cafe" checked />
          <div class="filter-dot" style="background:var(--cafe)"></div>
          <span class="filter-label-text">Café / coffee</span>
          <span class="filter-count" id="c-cafe">–</span>
        </label>
        <label class="filter-row">
          <input type="checkbox" id="f-restaurant" checked />
          <div class="filter-dot" style="background:var(--restaurant)"></div>
          <span class="filter-label-text">Restaurant</span>
          <span class="filter-count" id="c-restaurant">–</span>
        </label>
        <label class="filter-row">
          <input type="checkbox" id="f-bar" checked />
          <div class="filter-dot" style="background:var(--bar)"></div>
          <span class="filter-label-text">Bar / lounge</span>
          <span class="filter-count" id="c-bar">–</span>
        </label>
        <label class="filter-row">
          <input type="checkbox" id="f-food_truck" checked />
          <div class="filter-dot" style="background:var(--truck)"></div>
          <span class="filter-label-text">Food truck</span>
          <span class="filter-count" id="c-food_truck">–</span>
        </label>
      </div>

      <!-- Size filter -->
      <div class="sb-section">
        <div class="sb-label">Business size</div>
        <label class="filter-row">
          <input type="checkbox" id="f-small" checked />
          <span class="filter-label-text">Small (&lt; 10 staff)</span>
        </label>
        <label class="filter-row">
          <input type="checkbox" id="f-medium" checked />
          <span class="filter-label-text">Medium (10–35)</span>
        </label>
        <label class="filter-row">
          <input type="checkbox" id="f-large" checked />
          <span class="filter-label-text">Large (35+)</span>
        </label>
      </div>

      <!-- Status -->
      <div class="sb-section">
        <div class="sb-label">Licence status</div>
        <div class="toggle-row">
          <button class="toggle-btn active" id="s-active" data-status="active">Active</button>
          <button class="toggle-btn active" id="s-inactive" data-status="inactive">Inactive</button>
        </div>
      </div>

      <!-- Neighbourhoods -->
      <div class="sb-section">
        <div class="sb-label">Neighbourhood</div>
        <div class="hood-pills" id="hood-pills"></div>
      </div>

      <!-- Benchmarks -->
      <div class="sb-section" style="flex:1">
        <div class="sb-label">BC benchmarks 2026</div>
        <div class="bench-cards" id="bench-cards"></div>
      </div>

      <button id="reset-btn">Reset all filters</button>
    </div>

    <!-- Map -->
    <div id="map-wrap">
      <div id="map"></div>
      <div id="legend">
        <div class="leg-item"><div class="leg-dot" style="background:var(--cafe)"></div>Café</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--restaurant)"></div>Restaurant</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--bar)"></div>Bar</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--truck)"></div>Food truck</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--inactive); opacity:0.5"></div>Inactive</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const state = {
  search: '',
  types: { cafe: true, restaurant: true, bar: true, food_truck: true },
  sizes: { small: true, medium: true, large: true },
  statuses: { active: true, inactive: true },
  hoods: new Set(), // empty = all
};

const TYPE_COLORS = { cafe: '#c8f552', restaurant: '#52c8f5', bar: '#f5a352', food_truck: '#f552b2' };
const TYPE_LABELS = { cafe: 'Café', restaurant: 'Restaurant', bar: 'Bar', food_truck: 'Food truck' };

// ── Map init ───────────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [49.262, -123.1200],
  zoom: 13,
  zoomControl: true,
  attributionControl: true,
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19,
}).addTo(map);

// ── Markers ────────────────────────────────────────────────────────────────
const markerLayer = L.layerGroup().addTo(map);
const markerMap = {}; // id -> marker

function makeIcon(type, status) {
  const color = status === 'inactive' ? '#3a3a3a' : (TYPE_COLORS[type] || '#888');
  const ring = status === 'inactive' ? 'rgba(255,255,255,0.1)' : color + '40';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">
    <circle cx="10" cy="10" r="8" fill="${ring}"/>
    <circle cx="10" cy="10" r="5" fill="${color}" opacity="${status === 'inactive' ? 0.4 : 0.92}"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [20, 20],
    iconAnchor: [10, 10],
    popupAnchor: [0, -12],
  });
}

function makePopupHTML(b) {
  const color = b.status === 'inactive' ? '#4a4a4a' : (TYPE_COLORS[b.type] || '#888');
  const bgAlpha = b.status === 'inactive' ? 'rgba(255,255,255,0.05)' : color + '20';
  return `<div class="popup-inner">
    <span class="popup-type-badge" style="background:${bgAlpha};color:${color}">${TYPE_LABELS[b.type] || b.type}</span>
    <div class="popup-name">${b.name}</div>
    <table class="popup-table">
      <tr><td>Address</td><td>${b.address}</td></tr>
      <tr><td>Neighbourhood</td><td>${b.neighbourhood}</td></tr>
      <tr><td>Employees</td><td>${b.employees}</td></tr>
      <tr><td>Licence</td><td>${b.licence}</td></tr>
    </table>
    <span class="popup-status status-${b.status}">${b.status === 'active' ? 'Active' : 'Inactive'}</span>
  </div>`;
}

function getSize(emp) {
  if (emp < 10) return 'small';
  if (emp <= 35) return 'medium';
  return 'large';
}

function filterBusiness(b) {
  if (!state.types[b.type]) return false;
  if (!state.sizes[getSize(b.employees)]) return false;
  if (!state.statuses[b.status]) return false;
  if (state.hoods.size > 0 && !state.hoods.has(b.neighbourhood)) return false;
  if (state.search) {
    const q = state.search.toLowerCase();
    if (!b.name.toLowerCase().includes(q) &&
        !b.address.toLowerCase().includes(q) &&
        !b.neighbourhood.toLowerCase().includes(q)) return false;
  }
  return true;
}

function rebuildMarkers() {
  markerLayer.clearLayers();
  let visible = 0;

  // update type counts
  const typeCounts = { cafe: 0, restaurant: 0, bar: 0, food_truck: 0 };
  BUSINESSES.forEach(b => {
    if (state.types[b.type]) typeCounts[b.type]++;
  });
  Object.keys(typeCounts).forEach(t => {
    const el = document.getElementById('c-' + t);
    if (el) el.textContent = typeCounts[t];
  });

  BUSINESSES.forEach(b => {
    if (!filterBusiness(b)) return;
    visible++;
    const marker = L.marker([b.lat, b.lng], { icon: makeIcon(b.type, b.status) });
    marker.bindPopup(makePopupHTML(b), { maxWidth: 260 });
    markerLayer.addLayer(marker);
  });

  document.getElementById('count-num').textContent = visible;
}

// ── Neighbourhood pills ────────────────────────────────────────────────────
function buildHoodPills() {
  const hoods = [...new Set(BUSINESSES.map(b => b.neighbourhood))].sort();
  const wrap = document.getElementById('hood-pills');
  wrap.innerHTML = '';
  hoods.forEach(h => {
    const pill = document.createElement('div');
    pill.className = 'hood-pill';
    pill.textContent = h;
    pill.addEventListener('click', () => {
      if (state.hoods.has(h)) {
        state.hoods.delete(h);
        pill.classList.remove('active');
      } else {
        state.hoods.add(h);
        pill.classList.add('active');
      }
      rebuildMarkers();
    });
    wrap.appendChild(pill);
  });
}

// ── Benchmarks ─────────────────────────────────────────────────────────────
function buildBenchmarks() {
  const wrap = document.getElementById('bench-cards');
  BENCHMARKS.forEach(b => {
    wrap.innerHTML += `<div class="bench-card">
      <div class="bench-stat">${b.stat}</div>
      <div class="bench-desc">${b.desc}</div>
      <div class="bench-src">${b.source}</div>
    </div>`;
  });
}

// ── Event wiring ───────────────────────────────────────────────────────────
// Type checkboxes
['cafe', 'restaurant', 'bar', 'food_truck'].forEach(t => {
  document.getElementById('f-' + t).addEventListener('change', e => {
    state.types[t] = e.target.checked;
    rebuildMarkers();
  });
});

// Size checkboxes
['small', 'medium', 'large'].forEach(s => {
  document.getElementById('f-' + s).addEventListener('change', e => {
    state.sizes[s] = e.target.checked;
    rebuildMarkers();
  });
});

// Status toggles
document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const st = btn.dataset.status;
    state.statuses[st] = !state.statuses[st];
    btn.classList.toggle('active', state.statuses[st]);
    rebuildMarkers();
  });
});

// Search
let searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.search = e.target.value.trim();
    rebuildMarkers();
  }, 220);
});

// Reset
document.getElementById('reset-btn').addEventListener('click', () => {
  state.search = '';
  state.hoods.clear();
  state.types = { cafe: true, restaurant: true, bar: true, food_truck: true };
  state.sizes = { small: true, medium: true, large: true };
  state.statuses = { active: true, inactive: true };

  document.getElementById('search-input').value = '';
  ['cafe','restaurant','bar','food_truck'].forEach(t => document.getElementById('f-'+t).checked = true);
  ['small','medium','large'].forEach(s => document.getElementById('f-'+s).checked = true);
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.add('active'));
  document.querySelectorAll('.hood-pill').forEach(p => p.classList.remove('active'));

  map.setView([49.262, -123.1200], 13);
  rebuildMarkers();
});

// Mobile sidebar toggle
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
document.getElementById('menu-btn').addEventListener('click', () => {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('visible');
});
overlay.addEventListener('click', () => {
  sidebar.classList.remove('open');
  overlay.classList.remove('visible');
});

// ── Init ───────────────────────────────────────────────────────────────────
buildHoodPills();
buildBenchmarks();
rebuildMarkers();
</script>
</body>
</html>
