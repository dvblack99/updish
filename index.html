<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UpDish — Vancouver Food Scene Map</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="data.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0e0e0e;
    --surface:    #161616;
    --surface2:   #1e1e1e;
    --border:     rgba(255,255,255,0.08);
    --border2:    rgba(255,255,255,0.14);
    --text:       #f0ede8;
    --muted:      #8a8782;
    --hint:       #4f4e4b;
    --accent:     #c8f552;
    --accent-dim: rgba(200,245,82,0.12);
    --c-restaurant:        #52c8f5;
    --c-restaurant-liquor: #f5a352;
    --c-bar:               #f552b2;
    --c-street-vendor:     #f5e652;
    --c-caterer:           #a0a09a;
    --c-inactive:          #3a3a3a;
    --ff-head: 'DM Serif Display', Georgia, serif;
    --ff-body: 'DM Sans', system-ui, sans-serif;
    --ff-mono: 'DM Mono', monospace;
  }

  html, body { height: 100%; margin: 0; overflow: hidden; font-family: var(--ff-body); background: var(--bg); color: var(--text); }

  #topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 52px;
    display: flex; align-items: center; gap: 14px; padding: 0 16px;
    background: var(--surface); border-bottom: 1px solid var(--border); z-index: 900;
  }
  #logo { font-family: var(--ff-head); font-size: 22px; letter-spacing: -0.5px; color: var(--text); white-space: nowrap; flex-shrink: 0; }
  #logo span { color: var(--accent); }
  #search-wrap { flex: 1; max-width: 420px; position: relative; }
  #search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; opacity: 0.4; pointer-events: none; }
  #search-input { width: 100%; padding: 8px 10px 8px 32px; font-family: var(--ff-body); font-size: 13px; background: var(--surface2); color: var(--text); border: 1px solid var(--border2); border-radius: 8px; outline: none; transition: border-color 0.15s; }
  #search-input:focus { border-color: var(--accent); }
  #search-input::placeholder { color: var(--hint); }
  #count-pill { margin-left: auto; flex-shrink: 0; font-size: 12px; font-family: var(--ff-mono); color: var(--muted); white-space: nowrap; background: var(--surface2); border: 1px solid var(--border); padding: 5px 10px; border-radius: 100px; }
  #count-pill strong { color: var(--accent); }
  #menu-btn { display: none; flex-shrink: 0; background: none; border: 1px solid var(--border2); border-radius: 6px; padding: 7px 9px; cursor: pointer; color: var(--text); line-height: 1; }

  #sidebar {
    position: fixed; top: 52px; left: 0; bottom: 0; width: 230px;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow-y: auto; z-index: 800;
    transition: transform 0.25s ease;
  }
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  #map { position: fixed; top: 52px; left: 230px; right: 0; bottom: 0; height: auto; width: auto; }

  .sb-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .sb-label { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--hint); margin-bottom: 10px; }
  .filter-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; cursor: pointer; user-select: none; }
  .filter-row input[type="checkbox"] { appearance: none; -webkit-appearance: none; width: 14px; height: 14px; flex-shrink: 0; border: 1.5px solid var(--border2); border-radius: 3px; cursor: pointer; position: relative; transition: all 0.12s; }
  .filter-row input[type="checkbox"]:checked { border-color: var(--accent); background: var(--accent); }
  .filter-row input[type="checkbox"]:checked::after { content: ''; position: absolute; top: 1px; left: 3px; width: 5px; height: 8px; border: 2px solid #000; border-top: none; border-left: none; transform: rotate(45deg); }
  .filter-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .filter-label-text { font-size: 13px; color: var(--text); flex: 1; }
  .filter-count { font-size: 11px; font-family: var(--ff-mono); color: var(--hint); }

  .hood-pills { display: flex; flex-wrap: wrap; gap: 5px; }
  .hood-pill { font-size: 11px; padding: 4px 9px; border-radius: 100px; border: 1px solid var(--border2); cursor: pointer; color: var(--muted); transition: all 0.15s; user-select: none; }
  .hood-pill.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 500; }

  .toggle-row { display: flex; gap: 6px; }
  .toggle-btn { flex: 1; font-size: 11px; padding: 6px 8px; border: 1px solid var(--border2); border-radius: 6px; background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .toggle-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  #reset-btn { margin: 12px 16px; padding: 9px; width: calc(100% - 32px); background: none; border: 1px solid var(--border2); border-radius: 8px; color: var(--muted); font-size: 12px; cursor: pointer; letter-spacing: 0.3px; transition: all 0.15s; font-family: var(--ff-body); }
  #reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  .bench-cards { display: flex; flex-direction: column; gap: 8px; }
  .bench-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 11px; }
  .bench-stat { font-family: var(--ff-head); font-size: 22px; color: var(--accent); line-height: 1; }
  .bench-desc { font-size: 11px; color: var(--text); margin-top: 3px; line-height: 1.4; }
  .bench-src { font-size: 10px; color: var(--hint); margin-top: 4px; }

  .leaflet-container { background: #1a1f1a; font-family: var(--ff-body); }
  .leaflet-tile { filter: brightness(0.55) saturate(0.7) hue-rotate(5deg); }
  .leaflet-control-attribution { background: rgba(0,0,0,0.5) !important; color: #666 !important; font-size: 9px !important; }
  .leaflet-control-attribution a { color: #888 !important; }
  .leaflet-control-zoom a { background: var(--surface) !important; color: var(--text) !important; border-color: var(--border2) !important; }
  .leaflet-control-zoom a:hover { background: var(--surface2) !important; }

  /* cluster styling */
  .marker-cluster { background: rgba(14,14,14,0.75); }
  .marker-cluster div { background: rgba(200,245,82,0.85); color: #000; font-family: var(--ff-mono); font-size: 12px; font-weight: 600; }
  .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div { background: rgba(200,245,82,0.85); }
  .leaflet-popup-content-wrapper { background: var(--surface) !important; color: var(--text) !important; border: 1px solid var(--border2) !important; border-radius: 12px !important; box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important; padding: 0 !important; }
  .leaflet-popup-content { margin: 0 !important; width: auto !important; }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-close-button { color: var(--muted) !important; top: 10px !important; right: 12px !important; font-size: 18px !important; }

  .popup-inner { padding: 16px 18px 14px; min-width: 200px; }
  .popup-type-badge { display: inline-block; font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase; font-weight: 600; padding: 3px 7px; border-radius: 100px; margin-bottom: 8px; }
  .popup-name { font-family: var(--ff-head); font-size: 16px; color: var(--text); margin-bottom: 10px; line-height: 1.3; }
  .popup-table { width: 100%; border-collapse: collapse; }
  .popup-table td { font-size: 12px; padding: 3px 0; vertical-align: top; }
  .popup-table td:first-child { color: var(--muted); padding-right: 12px; white-space: nowrap; }
  .popup-table td:last-child { color: var(--text); }
  .popup-status { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 100px; margin-top: 10px; background: rgba(200,245,82,0.15); color: var(--accent); border: 1px solid rgba(200,245,82,0.3); }

  #legend { position: fixed; bottom: 18px; left: 246px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; background: rgba(14,14,14,0.85); border: 1px solid var(--border2); border-radius: 100px; padding: 7px 14px; z-index: 500; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  #overlay { display: none; position: fixed; top: 52px; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 799; }
  #overlay.visible { display: block; }

  @media (max-width: 680px) {
    #menu-btn { display: block; }
    #count-pill { display: none; }
    #sidebar { transform: translateX(-100%); }
    #sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,0.6); }
    #map { left: 0; }
    #legend { display: none; }
  }
</style>
</head>
<body>

<div id="topbar">
  <button id="menu-btn" aria-label="Toggle filters">
    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><rect width="16" height="1.5" rx="1" fill="currentColor"/><rect y="5.25" width="16" height="1.5" rx="1" fill="currentColor"/><rect y="10.5" width="16" height="1.5" rx="1" fill="currentColor"/></svg>
  </button>
  <div id="logo">Up<span>Dish</span></div>
  <div id="search-wrap">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5l3.5 3.5"/></svg>
    <input id="search-input" type="text" placeholder="Search neighbourhood, address, or business…" autocomplete="off" />
  </div>
  <div id="count-pill"><strong id="count-num">–</strong> businesses</div>
</div>

<div id="sidebar">
  <div class="sb-section">
    <div class="sb-label">Business type</div>
    <label class="filter-row"><input type="checkbox" id="f-restaurant" checked /><div class="filter-dot" style="background:var(--c-restaurant)"></div><span class="filter-label-text">Restaurant</span><span class="filter-count" id="c-restaurant">–</span></label>
    <label class="filter-row"><input type="checkbox" id="f-restaurant_liquor" checked /><div class="filter-dot" style="background:var(--c-restaurant-liquor)"></div><span class="filter-label-text">Restaurant + liquor</span><span class="filter-count" id="c-restaurant_liquor">–</span></label>
    <label class="filter-row"><input type="checkbox" id="f-bar" checked /><div class="filter-dot" style="background:var(--c-bar)"></div><span class="filter-label-text">Bar / lounge</span><span class="filter-count" id="c-bar">–</span></label>
    <label class="filter-row"><input type="checkbox" id="f-street_vendor" checked /><div class="filter-dot" style="background:var(--c-street-vendor)"></div><span class="filter-label-text">Street vendor</span><span class="filter-count" id="c-street_vendor">–</span></label>
    <label class="filter-row"><input type="checkbox" id="f-caterer" checked /><div class="filter-dot" style="background:var(--c-caterer)"></div><span class="filter-label-text">Caterer</span><span class="filter-count" id="c-caterer">–</span></label>
  </div>
  <div class="sb-section">
    <div class="sb-label">Business size</div>
    <label class="filter-row"><input type="checkbox" id="f-small" checked /><span class="filter-label-text">Small (&lt;10 staff)</span></label>
    <label class="filter-row"><input type="checkbox" id="f-medium" checked /><span class="filter-label-text">Medium (10–35)</span></label>
    <label class="filter-row"><input type="checkbox" id="f-large" checked /><span class="filter-label-text">Large (35+)</span></label>
  </div>
  <div class="sb-section">
    <div class="sb-label">Neighbourhood</div>
    <div class="hood-pills" id="hood-pills"></div>
  </div>
  <div class="sb-section" style="flex:1">
    <div class="sb-label">BC benchmarks 2026</div>
    <div class="bench-cards" id="bench-cards"></div>
  </div>
  <button id="reset-btn">Reset all filters</button>
</div>

<div id="map"></div>

<div id="legend">
  <div class="leg-item"><div class="leg-dot" style="background:var(--c-restaurant)"></div>Restaurant</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--c-restaurant-liquor)"></div>Restaurant + liquor</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--c-bar)"></div>Bar</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--c-street-vendor)"></div>Street vendor</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--c-caterer)"></div>Caterer</div>
</div>

<div id="overlay"></div>

<script>
const TYPE_COLORS = {
  restaurant:        '#52c8f5',
  restaurant_liquor: '#f5a352',
  bar:               '#f552b2',
  street_vendor:     '#f5e652',
  caterer:           '#a0a09a',
};
const TYPE_LABELS = {
  restaurant:        'Restaurant',
  restaurant_liquor: 'Restaurant + liquor',
  bar:               'Bar / lounge',
  street_vendor:     'Street vendor',
  caterer:           'Caterer',
};
const ALL_TYPES = Object.keys(TYPE_COLORS);

const state = {
  search: '',
  types: Object.fromEntries(ALL_TYPES.map(t => [t, true])),
  sizes: { small: true, medium: true, large: true },
  hoods: new Set(),
};

const map = L.map('map', { center: [49.262, -123.120], zoom: 12 });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19,
}).addTo(map);
const markerLayer = L.markerClusterGroup({
  chunkedLoading: true,
  maxClusterRadius: 80,
  disableClusteringAtZoom: 16,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true,
}).addTo(map);

function makeIcon(type) {
  const color = TYPE_COLORS[type] || '#888';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><circle cx="10" cy="10" r="8" fill="${color}40"/><circle cx="10" cy="10" r="5" fill="${color}" opacity="0.92"/></svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [20,20], iconAnchor: [10,10], popupAnchor: [0,-12] });
}

function makePopupHTML(b) {
  const color = TYPE_COLORS[b.type] || '#888';
  return `<div class="popup-inner">
    <span class="popup-type-badge" style="background:${color}20;color:${color}">${TYPE_LABELS[b.type] || b.type}</span>
    <div class="popup-name">${b.name}</div>
    <table class="popup-table">
      <tr><td>Address</td><td>${b.address}</td></tr>
      <tr><td>Neighbourhood</td><td>${b.neighbourhood}</td></tr>
      <tr><td>Employees</td><td>${b.employees || 'unknown'}</td></tr>
      <tr><td>Licence</td><td>${b.licence}</td></tr>
    </table>
    <span class="popup-status">Active</span>
  </div>`;
}

function getSize(e) { return e < 10 ? 'small' : e <= 35 ? 'medium' : 'large'; }

function filterBusiness(b) {
  if (!state.types[b.type]) return false;
  if (!state.sizes[getSize(b.employees)]) return false;
  if (state.hoods.size > 0 && !state.hoods.has(b.neighbourhood)) return false;
  if (state.search) {
    const q = state.search.toLowerCase();
    if (!b.name.toLowerCase().includes(q) && !b.address.toLowerCase().includes(q) && !b.neighbourhood.toLowerCase().includes(q)) return false;
  }
  return true;
}

function rebuildMarkers() {
  markerLayer.clearLayers();
  let visible = 0;
  const counts = Object.fromEntries(ALL_TYPES.map(t => [t, 0]));
  BUSINESSES.forEach(b => { if (b.type in counts) counts[b.type]++; });
  ALL_TYPES.forEach(t => { const el = document.getElementById('c-' + t); if (el) el.textContent = counts[t]; });
  const markers = [];
  BUSINESSES.forEach(b => {
    if (!filterBusiness(b)) return;
    visible++;
    markers.push(L.marker([b.lat, b.lng], { icon: makeIcon(b.type) })
      .bindPopup(makePopupHTML(b), { maxWidth: 260 }));
  });
  markerLayer.addLayers(markers);
  document.getElementById('count-num').textContent = visible;
}

function buildHoodPills() {
  const hoods = [...new Set(BUSINESSES.map(b => b.neighbourhood))].sort();
  const wrap = document.getElementById('hood-pills');
  hoods.forEach(h => {
    const pill = document.createElement('div');
    pill.className = 'hood-pill'; pill.textContent = h;
    pill.addEventListener('click', () => {
      state.hoods.has(h) ? state.hoods.delete(h) : state.hoods.add(h);
      pill.classList.toggle('active', state.hoods.has(h));
      rebuildMarkers();
    });
    wrap.appendChild(pill);
  });
}

function buildBenchmarks() {
  const wrap = document.getElementById('bench-cards');
  BENCHMARKS.forEach(b => {
    wrap.innerHTML += `<div class="bench-card"><div class="bench-stat">${b.stat}</div><div class="bench-desc">${b.desc}</div><div class="bench-src">${b.source}</div></div>`;
  });
}

ALL_TYPES.forEach(t => {
  document.getElementById('f-' + t).addEventListener('change', e => { state.types[t] = e.target.checked; rebuildMarkers(); });
});
['small','medium','large'].forEach(s => {
  document.getElementById('f-' + s).addEventListener('change', e => { state.sizes[s] = e.target.checked; rebuildMarkers(); });
});

let searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { state.search = e.target.value.trim(); rebuildMarkers(); }, 220);
});

document.getElementById('reset-btn').addEventListener('click', () => {
  state.search = ''; state.hoods.clear();
  state.types = Object.fromEntries(ALL_TYPES.map(t => [t, true]));
  state.sizes = { small: true, medium: true, large: true };
  document.getElementById('search-input').value = '';
  ALL_TYPES.forEach(t => document.getElementById('f-' + t).checked = true);
  ['small','medium','large'].forEach(s => document.getElementById('f-' + s).checked = true);
  document.querySelectorAll('.hood-pill').forEach(p => p.classList.remove('active'));
  map.setView([49.262, -123.120], 13);
  rebuildMarkers();
});

const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
document.getElementById('menu-btn').addEventListener('click', () => { sidebar.classList.toggle('open'); overlay.classList.toggle('visible'); });
overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('visible'); });

buildHoodPills();
buildBenchmarks();
rebuildMarkers();
</script>
</body>
</html>
